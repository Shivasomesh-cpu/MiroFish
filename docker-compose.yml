services:
  posiedon:
    image: ghcr.io/666ghj/posiedon:latest
    # Optional mirror image example:
    # image: ghcr.nju.edu.cn/666ghj/posiedon:latest
    container_name: posiedon
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

